<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christophe Schaillee — NexSky</title>
<meta name="description" content="Christophe Schaillee, Managing Partner at NexSky — Boutique Family Office">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --midnight: #1A1F3D;
    --deep-navy: #252B4D;
    --slate: #3D4567;
    --stone: #D4C5B2;
    --warm-sand: #E8DDD0;
    --cream: #F5F1EC;
    --off-white: #FAFAF8;
    --gold: #B8965A;
    --gold-light: #D4B87C;
    --teal: #5B8E8D;
    --text-secondary: #6B7094;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--midnight);
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
    position: relative;
  }

  /* Subtle background glow */
  .card::before {
    content: '';
    position: fixed;
    top: -40%;
    right: -30%;
    width: 80%;
    height: 160%;
    background: radial-gradient(ellipse, rgba(91,142,141,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Monogram */
  .monogram {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    letter-spacing: 4px;
    margin-bottom: 32px;
  }
  .monogram .n { color: #fff; }
  .monogram .s { color: var(--gold); }

  /* Divider line */
  .divider {
    width: 48px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
    margin: 0 auto 32px;
  }

  /* Wordmark */
  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .wordmark .sky { color: var(--gold); }

  .tagline {
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 40px;
  }

  /* Name & title */
  .name {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }

  .title {
    font-weight: 400;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 32px;
  }

  /* Contact details */
  .contact {
    margin-bottom: 40px;
  }

  .contact a {
    display: block;
    color: var(--stone);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    padding: 8px 0;
    transition: color 0.2s ease;
  }

  .contact a:hover {
    color: var(--gold-light);
  }

  .contact .location {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-top: 8px;
  }

  /* Action buttons */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 24px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
    border: none;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--midnight);
  }
  .btn-primary:hover {
    background: var(--gold-light);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--stone);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  .btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* Footer */
  .footer {
    margin-top: 48px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
    opacity: 0.5;
  }

  /* Smooth entrance */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card > * {
    animation: fadeUp 0.6s ease both;
  }
  .card > *:nth-child(2) { animation-delay: 0.08s; }
  .card > *:nth-child(3) { animation-delay: 0.14s; }
  .card > *:nth-child(4) { animation-delay: 0.2s; }
  .card > *:nth-child(5) { animation-delay: 0.26s; }
  .card > *:nth-child(6) { animation-delay: 0.32s; }
  .card > *:nth-child(7) { animation-delay: 0.38s; }
  .card > *:nth-child(8) { animation-delay: 0.44s; }
  .card > *:nth-child(9) { animation-delay: 0.5s; }
  .card > *:nth-child(10) { animation-delay: 0.56s; }
</style>
</head>
<body>

<div class="card">

  <div class="monogram"><span class="n">N</span><span class="s">S</span></div>

  <div class="divider"></div>

  <div class="wordmark">Nex<span class="sky">Sky</span></div>

  <div class="name">Christophe Schaillee</div>

  <div class="title">Managing Partner</div>

  <div class="contact">
    <a href="mailto:christophe@nexsky.io">christophe@nexsky.io</a>
    <a href="tel:+33678638533">+33 6 78 63 85 33</a>
    <a href="https://www.nexsky.io">nexsky.io</a>
    <div class="location">London &ensp;&middot;&ensp; Monaco</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="downloadVCard()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save Contact
    </button>
    <a class="btn btn-secondary" href="mailto:christophe@nexsky.io">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Send Email
    </a>
    <button class="btn btn-secondary" onclick="showQR()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Share via QR
    </button>
  </div>

  <!-- QR Overlay -->
  <div id="qr-overlay" onclick="hideQR()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--midnight); z-index:100; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;">
    <div class="monogram" style="margin-bottom:24px;"><span class="n">N</span><span class="s">S</span></div>
    <div id="qr-code" style="background:#fff; padding:16px; border-radius:12px; margin-bottom:24px;"></div>
    <div style="font-family:'Inter',sans-serif; font-size:14px; color:var(--stone); letter-spacing:0.5px;">card.nexsky.io</div>
    <div style="font-family:'Inter',sans-serif; font-size:12px; color:var(--text-secondary); margin-top:16px;">Tap anywhere to close</div>
  </div>

  <div class="footer">Boutique Family Office</div>

</div>

<script>
let qrGenerated = false;
function showQR() {
  const overlay = document.getElementById('qr-overlay');
  overlay.style.display = 'flex';
  if (!qrGenerated) {
    new QRCode(document.getElementById('qr-code'), {
      text: 'https://card.nexsky.io',
      width: 220,
      height: 220,
      colorDark: '#1A1F3D',
      colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.H
    });
    qrGenerated = true;
  }
}
function hideQR() {
  document.getElementById('qr-overlay').style.display = 'none';
}

function downloadVCard() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Schaillee;Christophe;;;',
    'FN:Christophe Schaillee',
    'ORG:NexSky',
    'TITLE:Managing Partner',
    'EMAIL;TYPE=WORK:christophe@nexsky.io',
    'TEL;TYPE=WORK,VOICE:+33678638533',
    'URL:https://www.nexsky.io',
    'ADR;TYPE=WORK:;;;;;;London',
    'NOTE:NexSky — Boutique Family Office · London · Monaco',
    'END:VCARD'
  ].join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Christophe_Schaillee_NexSky.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
